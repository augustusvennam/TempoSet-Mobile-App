name: temposet
description: "TempoSet - Professional metronome with song tempo storage and setlist management"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Audio

  # Database
  sqflite: ^2.4.1
  path_provider: ^2.1.5
  path: ^1.9.1

  # State management
  provider: ^6.1.2

  # Utilities
  shared_preferences: ^2.3.4
  wakelock_plus: ^1.2.10
  uuid: ^4.5.1
  vibration: ^2.0.1
  metronome: ^2.0.7
  flutter_soloud: ^4.0.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/sounds/

  fonts:
    - family: Space Grotesk
      fonts:
        - asset: fonts/SpaceGrotesk-Variable.ttf
